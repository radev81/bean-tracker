# We'll add the HTTPS server block in Phase 6 (after SSL certs are set up).
# For now, Nginx listens on port 80 and proxies to the API.
# Phase 6 will add the port 443 SSL block.

server {
    listen 8080;
    server_name ra-homelab.synology.me;

    # Health check endpoint so you can test Nginx is up
    location /health {
        return 200 'nginx ok\n';
        add_header Content-Type text/plain;
    }

    # ── 1. Internal auth check — Nginx calls this before every /api/ request ──
    location = /authelia_verify {
      internal;
      proxy_pass http://bean-authelia:9091/api/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Forwarded-Method $request_method;
      proxy_set_header Cookie $http_cookie;
    }

    # ── 2. Authelia login portal ──────────────────────────────────────────────
    location /authelia/ {
      proxy_pass http://bean-authelia:9091/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ── 3. Your API — protected by Authelia ──────────────────────────────────

    # All /api/* requests are forwarded to the Express container
    # Docker Compose puts both containers on the same network,
    # so "api" resolves to the Express container by its service name
    location /api/ {
        # Check auth before forwarding
        auth_request /authelia_verify;
        # If not authenticated, return 401 (frontend will redirect to login)
        auth_request_set $authelia_status $upstream_status;

        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Raise limits slightly for bean card saves with notes
        client_max_body_size 1m;
    }
}