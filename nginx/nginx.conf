events {}

http {
  server {
    listen 8080;
    server_name ra-homelab.synology.me;
    resolver 127.0.0.11 valid=30s;

    # ── Internal auth check ───────────────────────────────────────────────────
    location = /authelia_verify {
      internal;
      proxy_pass http://bean-authelia:9091/authelia/api/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_set_header X-Forwarded-Method $request_method;
      proxy_set_header Cookie $http_cookie;
    }

    # ── Authelia login portal ─────────────────────────────────────────────────
    location /authelia/ {
      proxy_pass http://bean-authelia:9091/authelia/;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Uri $request_uri;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # After Authelia login, bounce back to the GitHub Pages app
    location = /app {
      return 302 https://radev81.github.io/bean-tracker/;
    }

    # ── API — protected ───────────────────────────────────────────────────────
    location /api/ {

      # Handle preflight first — must include CORS headers here explicitly
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "https://radev81.github.io";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Max-Age 1728000;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }

      # CORS headers — added on ALL responses including 401, always
      add_header Access-Control-Allow-Origin  "https://radev81.github.io" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Allow-Credentials "true" always;

      auth_request /authelia_verify;

      proxy_pass http://bean-api:3001;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}